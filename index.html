<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Car Racer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0b0f1a;
      color: #e6edf3;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    h1 { margin: 0; font-weight: 600; letter-spacing: 2px; }
    canvas {
      background: #111827;
      border: 2px solid #1f2937;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      max-width: 95vw;
      max-height: 70vh;
    }
    .hint { font-size: 14px; color: #8b98a9; }
    .hint b { color: #e6edf3; }
    .touch-controls {
      display: none;
      gap: 24px;
    }
    .touch-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid #374151;
      background: rgba(31, 41, 55, 0.8);
      color: #e6edf3;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .touch-btn:active { background: rgba(96, 165, 250, 0.3); }
    @media (hover: none) and (pointer: coarse) {
      .touch-controls { display: flex; }
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <h1>CAR&nbsp;RACER</h1>
  <canvas id="game" width="400" height="600"></canvas>
  <p class="hint">Dodge traffic with <b>← / →</b> or <b>A / D</b> &nbsp;·&nbsp; Press <b>Space</b> to (re)start</p>
  <div class="touch-controls">
    <button class="touch-btn" id="btn-left">&#9664;</button>
    <button class="touch-btn" id="btn-right">&#9654;</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;
    const isTouchDevice = "ontouchstart" in window || navigator.maxTouchPoints > 0;

    const CAR_W = 40;
    const CAR_H = 70;
    const ROAD_W = 300;
    const ROAD_LEFT = (W - ROAD_W) / 2;
    const LANE_W = ROAD_W / 3;
    const PLAYER_Y = H - 120;
    const INITIAL_SPEED = 3;
    const MAX_SPEED = 10;
    const SPEED_INCREMENT = 0.001;
    const SPAWN_INTERVAL_START = 90;
    const SPAWN_INTERVAL_MIN = 30;

    const OBS_COLORS = ["#f87171", "#fbbf24", "#34d399", "#a78bfa", "#fb923c"];

    let gameState = "start";
    let player = { x: W / 2 - CAR_W / 2, y: PLAYER_Y };
    let obstacles = [];
    let score = 0;
    let highScore = 0;
    let speed = INITIAL_SPEED;
    let roadOffset = 0;
    let spawnTimer = 0;
    let spawnInterval = SPAWN_INTERVAL_START;
    const keys = {};

    function resetGame() {
      player.x = W / 2 - CAR_W / 2;
      obstacles = [];
      score = 0;
      speed = INITIAL_SPEED;
      roadOffset = 0;
      spawnTimer = 0;
      spawnInterval = SPAWN_INTERVAL_START;
    }

    function spawnObstacle() {
      const availableLanes = [0, 1, 2].filter(lane => {
        const laneX = ROAD_LEFT + lane * LANE_W + (LANE_W - CAR_W) / 2;
        return !obstacles.some(o => o.y < 120 && Math.abs(o.x - laneX) < CAR_W);
      });
      if (availableLanes.length === 0) return;
      const lane = availableLanes[Math.floor(Math.random() * availableLanes.length)];
      const x = ROAD_LEFT + lane * LANE_W + (LANE_W - CAR_W) / 2;
      const color = OBS_COLORS[Math.floor(Math.random() * OBS_COLORS.length)];
      obstacles.push({ x, y: -CAR_H, color });
    }

    function checkCollision(a, b) {
      return (
        a.x + 4 < b.x + CAR_W - 4 &&
        a.x + CAR_W - 4 > b.x + 4 &&
        a.y + 4 < b.y + CAR_H - 4 &&
        a.y + CAR_H - 4 > b.y + 4
      );
    }

    function drawRoad() {
      ctx.fillStyle = "#1a3a1a";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#2a2a2a";
      ctx.fillRect(ROAD_LEFT, 0, ROAD_W, H);

      ctx.strokeStyle = "rgba(255,255,255,0.6)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(ROAD_LEFT, 0);
      ctx.lineTo(ROAD_LEFT, H);
      ctx.moveTo(ROAD_LEFT + ROAD_W, 0);
      ctx.lineTo(ROAD_LEFT + ROAD_W, H);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.4)";
      ctx.lineWidth = 2;
      ctx.setLineDash([20, 20]);
      for (let i = 1; i < 3; i++) {
        const x = ROAD_LEFT + i * LANE_W;
        ctx.beginPath();
        ctx.lineDashOffset = -roadOffset;
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.lineDashOffset = 0;
    }

    function drawCar(x, y, bodyColor, isPlayer) {
      ctx.fillStyle = "#111";
      ctx.fillRect(x + 2, y + 6, 8, 14);
      ctx.fillRect(x + CAR_W - 10, y + 6, 8, 14);
      ctx.fillRect(x + 2, y + CAR_H - 20, 8, 14);
      ctx.fillRect(x + CAR_W - 10, y + CAR_H - 20, 8, 14);

      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.roundRect(x + 4, y, CAR_W - 8, CAR_H, 6);
      ctx.fill();

      if (isPlayer) {
        ctx.fillStyle = "#1e3a5f";
        ctx.fillRect(x + 10, y + 10, CAR_W - 20, 16);
      } else {
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(x + 10, y + CAR_H - 26, CAR_W - 20, 16);
        ctx.fillStyle = "#fbbf24";
        ctx.fillRect(x + 8, y + CAR_H - 4, 6, 4);
        ctx.fillRect(x + CAR_W - 14, y + CAR_H - 4, 6, 4);
      }
    }

    function drawHUD() {
      ctx.fillStyle = "#e6edf3";
      ctx.font = "20px system-ui, sans-serif";
      ctx.textAlign = "right";
      ctx.fillText("Score: " + score, W - 16, 30);
      ctx.font = "14px system-ui, sans-serif";
      ctx.fillStyle = "#8b98a9";
      ctx.fillText("Best: " + highScore, W - 16, 50);
      ctx.textAlign = "center";
    }

    function drawOverlay(lines) {
      ctx.fillStyle = "rgba(11, 15, 26, 0.7)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";
      let y = H / 2 - (lines.length - 1) * 20;
      for (const line of lines) {
        ctx.fillStyle = line.color || "#e6edf3";
        ctx.font = line.font || "20px system-ui, sans-serif";
        ctx.fillText(line.text, W / 2, y);
        y += line.gap || 40;
      }
    }

    function update() {
      if (gameState === "playing") {
        if (keys["ArrowLeft"] || keys["a"]) player.x -= 5;
        if (keys["ArrowRight"] || keys["d"]) player.x += 5;
        player.x = Math.max(ROAD_LEFT + 4, Math.min(ROAD_LEFT + ROAD_W - CAR_W - 4, player.x));

        roadOffset += speed;
        speed = Math.min(MAX_SPEED, speed + SPEED_INCREMENT);

        spawnTimer++;
        if (spawnTimer >= spawnInterval) {
          spawnObstacle();
          spawnTimer = 0;
          spawnInterval = Math.max(SPAWN_INTERVAL_MIN, spawnInterval - 0.5);
        }

        for (const o of obstacles) {
          o.y += speed * 0.7;
        }
        obstacles = obstacles.filter(o => o.y < H + CAR_H);

        for (const o of obstacles) {
          if (checkCollision(player, o)) {
            gameState = "gameover";
            highScore = Math.max(highScore, score);
            break;
          }
        }

        if (gameState === "playing") score++;
      }

      draw();
      requestAnimationFrame(update);
    }

    function draw() {
      drawRoad();

      for (const o of obstacles) {
        drawCar(o.x, o.y, o.color, false);
      }

      drawCar(player.x, player.y, "#60a5fa", true);

      if (gameState === "playing") {
        drawHUD();
      } else if (gameState === "start") {
        drawOverlay([
          { text: "CAR RACER", font: "36px system-ui, sans-serif" },
          { text: isTouchDevice ? "Tap to start" : "Press SPACE to start", color: "#8b98a9" }
        ]);
      } else if (gameState === "gameover") {
        drawOverlay([
          { text: "GAME OVER", font: "36px system-ui, sans-serif" },
          { text: "Score: " + score },
          { text: "Best: " + highScore, color: "#8b98a9" },
          { text: isTouchDevice ? "Tap to restart" : "Press SPACE to restart", color: "#8b98a9" }
        ]);
      }
    }

    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (e.key === " ") {
        if (gameState !== "playing") {
          resetGame();
          gameState = "playing";
        }
        e.preventDefault();
      }
    });
    document.addEventListener("keyup", (e) => { keys[e.key] = false; });

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      if (gameState !== "playing") {
        resetGame();
        gameState = "playing";
      }
    });

    const btnLeft = document.getElementById("btn-left");
    const btnRight = document.getElementById("btn-right");

    function addTouchButton(btn, key) {
      btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; });
      btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[key] = false; });
      btn.addEventListener("touchcancel", (e) => { e.preventDefault(); keys[key] = false; });
    }
    addTouchButton(btnLeft, "ArrowLeft");
    addTouchButton(btnRight, "ArrowRight");

    draw();
    requestAnimationFrame(update);
  </script>
</body>
</html>
