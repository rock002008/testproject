<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ping Pong</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0b0f1a;
      color: #e6edf3;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    h1 { margin: 0; font-weight: 600; letter-spacing: 2px; }
    canvas {
      background: #111827;
      border: 2px solid #1f2937;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .hint { font-size: 14px; color: #8b98a9; }
    .hint b { color: #e6edf3; }
  </style>
</head>
<body>
  <h1>PING&nbsp;PONG</h1>
  <canvas id="game" width="800" height="500"></canvas>
  <p class="hint">Move your paddle with the <b>mouse</b> or <b>↑ / ↓</b> keys &nbsp;·&nbsp; First to <b>7</b> wins &nbsp;·&nbsp; Press <b>Space</b> to (re)start</p>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    const PADDLE_W = 12;
    const PADDLE_H = 90;
    const BALL_R = 8;
    const WIN_SCORE = 7;

    const player = { x: 20, y: H / 2 - PADDLE_H / 2, score: 0 };
    const ai = { x: W - 20 - PADDLE_W, y: H / 2 - PADDLE_H / 2, score: 0 };
    const ball = { x: W / 2, y: H / 2, vx: 0, vy: 0 };

    let running = false;
    let winner = null;

    function resetBall(direction) {
      ball.x = W / 2;
      ball.y = H / 2;
      const angle = (Math.random() * 0.5 - 0.25) * Math.PI; // -45..45 deg
      const speed = 6;
      ball.vx = direction * speed * Math.cos(angle);
      ball.vy = speed * Math.sin(angle);
    }

    function startGame() {
      player.score = 0;
      ai.score = 0;
      winner = null;
      running = true;
      resetBall(Math.random() < 0.5 ? -1 : 1);
    }

    // --- Controls ---
    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const my = (e.clientY - rect.top) * (H / rect.height);
      player.y = Math.max(0, Math.min(H - PADDLE_H, my - PADDLE_H / 2));
    });

    const keys = {};
    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (e.key === " ") {
        if (!running) startGame();
        e.preventDefault();
      }
    });
    document.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function update() {
      if (running) {
        // keyboard paddle movement
        if (keys["ArrowUp"]) player.y -= 7;
        if (keys["ArrowDown"]) player.y += 7;
        player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));

        // move ball
        ball.x += ball.vx;
        ball.y += ball.vy;

        // top / bottom walls
        if (ball.y - BALL_R < 0 && ball.vy < 0) ball.vy *= -1;
        if (ball.y + BALL_R > H && ball.vy > 0) ball.vy *= -1;

        // paddle collisions
        if (
          ball.vx < 0 &&
          ball.x - BALL_R < player.x + PADDLE_W &&
          ball.x - BALL_R > player.x &&
          ball.y > player.y &&
          ball.y < player.y + PADDLE_H
        ) {
          ball.vx *= -1.06;
          ball.vy += ((ball.y - (player.y + PADDLE_H / 2)) / (PADDLE_H / 2)) * 3;
        }
        if (
          ball.vx > 0 &&
          ball.x + BALL_R > ai.x &&
          ball.x + BALL_R < ai.x + PADDLE_W &&
          ball.y > ai.y &&
          ball.y < ai.y + PADDLE_H
        ) {
          ball.vx *= -1.06;
          ball.vy += ((ball.y - (ai.y + PADDLE_H / 2)) / (PADDLE_H / 2)) * 3;
        }

        // simple AI: track the ball with a speed cap
        const aiCenter = ai.y + PADDLE_H / 2;
        if (aiCenter < ball.y - 12) ai.y += 5;
        else if (aiCenter > ball.y + 12) ai.y -= 5;
        ai.y = Math.max(0, Math.min(H - PADDLE_H, ai.y));

        // scoring
        if (ball.x < 0) {
          ai.score++;
          checkWinOrServe(1);
        } else if (ball.x > W) {
          player.score++;
          checkWinOrServe(-1);
        }
      }
      draw();
      requestAnimationFrame(update);
    }

    function checkWinOrServe(direction) {
      if (player.score >= WIN_SCORE || ai.score >= WIN_SCORE) {
        running = false;
        winner = player.score > ai.score ? "YOU WIN!" : "AI WINS!";
      } else {
        resetBall(direction);
      }
    }

    function draw() {
      // court
      ctx.fillStyle = "#111827";
      ctx.fillRect(0, 0, W, H);

      // center dashed line
      ctx.strokeStyle = "#374151";
      ctx.lineWidth = 3;
      ctx.setLineDash([12, 16]);
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // paddles
      ctx.fillStyle = "#60a5fa";
      ctx.fillRect(player.x, player.y, PADDLE_W, PADDLE_H);
      ctx.fillStyle = "#f87171";
      ctx.fillRect(ai.x, ai.y, PADDLE_W, PADDLE_H);

      // ball
      ctx.fillStyle = "#e6edf3";
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();

      // scores
      ctx.fillStyle = "#e6edf3";
      ctx.font = "48px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(player.score, W / 2 - 60, 60);
      ctx.fillText(ai.score, W / 2 + 60, 60);

      // overlay messages
      if (!running) {
        ctx.fillStyle = "rgba(11, 15, 26, 0.7)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#e6edf3";
        ctx.font = "36px system-ui, sans-serif";
        ctx.fillText(winner || "PING PONG", W / 2, H / 2 - 10);
        ctx.font = "20px system-ui, sans-serif";
        ctx.fillStyle = "#8b98a9";
        ctx.fillText("Press SPACE to start", W / 2, H / 2 + 30);
      }
    }

    draw();
    requestAnimationFrame(update);
  </script>
</body>
</html>
